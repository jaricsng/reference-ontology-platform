apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hospital-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jaricsng/reference-ontology-platform.git
    targetRevision: master
    path: m6-infra/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: hospital
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
