apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: hospital
spec:
  replicas: 1
  selector:
    matchLabels: { app: app }
  template:
    metadata:
      labels: { app: app }
    spec:
      containers:
        - name: app
          image: hospital/app:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - { name: ACTION_API, value: "http://action-api:8000" }
            - { name: AGENT_API, value: "http://agent:8002" }
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: hospital
spec:
  selector: { app: app }
  ports:
    - port: 3000
      targetPort: 3000
