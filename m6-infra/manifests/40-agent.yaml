apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent
  namespace: hospital
spec:
  replicas: 1
  selector:
    matchLabels: { app: agent }
  template:
    metadata:
      labels: { app: agent }
    spec:
      containers:
        - name: agent
          image: hospital/agent:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8002
          env:
            - { name: FUSEKI_ENDPOINT, value: "http://fuseki:3030/hospital" }
            - { name: OPA_URL, value: "http://opa:8181/v1/data/hospital/authz/decision" }
            # Ollama runs on the host; host.k3d.internal resolves to it from pods.
            - { name: OLLAMA_BASE_URL, value: "http://host.k3d.internal:11434" }
            - { name: OLLAMA_MODEL, value: "qwen2.5-coder:7b" }
          readinessProbe:
            httpGet: { path: /health, port: 8002 }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: agent
  namespace: hospital
spec:
  selector: { app: agent }
  ports:
    - port: 8002
      targetPort: 8002
