apiVersion: apps/v1
kind: Deployment
metadata:
  name: action-api
  namespace: hospital
spec:
  replicas: 2
  selector:
    matchLabels: { app: action-api }
  template:
    metadata:
      labels: { app: action-api }
    spec:
      containers:
        - name: action-api
          image: hospital/action-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - { name: FUSEKI_ENDPOINT, value: "http://fuseki:3030/hospital" }
            - { name: OPA_URL, value: "http://opa:8181/v1/data/hospital/authz/decision" }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: action-api
  namespace: hospital
spec:
  selector: { app: action-api }
  ports:
    - port: 8000
      targetPort: 8000
