apiVersion: apps/v1
kind: Deployment
metadata:
  name: fuseki
  namespace: hospital
spec:
  replicas: 1
  selector:
    matchLabels: { app: fuseki }
  template:
    metadata:
      labels: { app: fuseki }
    spec:
      containers:
        - name: fuseki
          image: hospital/fuseki:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3030
          readinessProbe:
            httpGet: { path: /$/ping, port: 3030 }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: fuseki
  namespace: hospital
spec:
  selector: { app: fuseki }
  ports:
    - port: 3030
      targetPort: 3030
