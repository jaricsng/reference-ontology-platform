version: 2

sources:
  - name: raw
    description: "Raw synthetic admission events as generated by generate_admissions.py."
    tables:
      - name: admissions
        description: >
          One row per raw admission event. May contain duplicate admission_ids,
          blank required fields, and whitespace/case noise — cleaned downstream.
        # dbt-duckdb reads this CSV directly as an external source, so it
        # appears as a true source node in the lineage graph.
        meta:
          external_location: "{{ env_var('M1_RAW_CSV') }}"
